<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>参与互动</title>
<script src="https://cdn.jsdelivr.net/npm/ably@2/ably.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #080808;
    font-family: 'Space Mono', monospace;
    color: #e0e0e0;
    overflow: hidden;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* HEADER */
  .header {
    flex-shrink: 0;
    padding: 28px 24px 20px;
    border-bottom: 1px solid #161616;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .title-block { display: flex; flex-direction: column; gap: 5px; }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.08em;
    color: #e8e8e8;
    line-height: 1;
  }

  .subtitle {
    font-size: 8px;
    letter-spacing: 0.22em;
    color: #333;
    text-transform: uppercase;
  }

  .conn-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid #1c1c1c;
  }

  .pill-dot {
    width: 5px; height: 5px;
    background: #333;
    border-radius: 50%;
    transition: background 0.3s;
  }
  .pill-dot.on { background: #aaa; animation: throb 2s ease-in-out infinite; }

  @keyframes throb {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  .pill-label {
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
    transition: color 0.3s;
  }
  .conn-pill.on .pill-label { color: #666; }

  /* PREVIEW */
  .preview {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scrollbar-width: none;
  }
  .preview::-webkit-scrollbar { display: none; }

  .preview-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: #222;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  #preview-text {
    font-size: 18px;
    line-height: 1.7;
    color: #585858;
    word-break: break-word;
    white-space: pre-wrap;
    min-height: 40px;
  }

  .preview-cursor {
    display: inline-block;
    width: 10px; height: 18px;
    background: #2a2a2a;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* INPUT AREA */
  .input-area {
    flex-shrink: 0;
    background: #0e0e0e;
    border-top: 1px solid #161616;
    padding: 16px 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .char-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .char-hint {
    font-size: 8px;
    letter-spacing: 0.15em;
    color: #222;
    text-transform: uppercase;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid #1c1c1c;
    color: #2a2a2a;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .clear-btn:active { color: #666; border-color: #333; }

  .textarea-wrap {
    position: relative;
  }

  #msg-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #1e1e1e;
    color: #e0e0e0;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    line-height: 1.6;
    padding: 10px 0 10px;
    outline: none;
    resize: none;
    min-height: 56px;
    max-height: 160px;
    transition: border-color 0.2s;
    caret-color: #888;
  }
  #msg-input::placeholder { color: #1e1e1e; }
  #msg-input:focus { border-color: #333; }

  .send-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .send-btn {
    flex: 1;
    background: #e8e8e8;
    border: none;
    color: #080808;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 0;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .send-btn:active { background: #bbb; }
  .send-btn:disabled { background: #1a1a1a; color: #333; cursor: default; }

  .append-btn {
    background: transparent;
    border: 1px solid #1c1c1c;
    color: #2e2e2e;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .append-btn:active { color: #666; border-color: #333; }
</style>
</head>
<body>

<div class="screen">
  <!-- HEADER -->
  <div class="header">
    <div class="title-block">
      <div class="title">LIVE DOC</div>
      <div class="subtitle">扫码互动终端</div>
    </div>
    <div class="conn-pill" id="conn-pill">
      <div class="pill-dot" id="pill-dot"></div>
      <span class="pill-label" id="pill-label">连接中</span>
    </div>
  </div>

  <!-- PREVIEW of what's on TV -->
  <div class="preview">
    <div class="preview-label">— 电视上显示的内容</div>
    <div id="preview-text"><span class="preview-cursor"></span></div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="char-bar">
      <span class="char-hint">输入内容 · 实时同步到大屏</span>
      <button class="clear-btn" id="clear-btn">清空</button>
    </div>
    <div class="textarea-wrap">
      <textarea id="msg-input" placeholder="在这里打字…" rows="2"></textarea>
    </div>
    <div class="send-row">
      <button class="send-btn" id="send-btn">发送到大屏</button>
      <button class="append-btn" id="append-btn">追加</button>
    </div>
  </div>
</div>

<script>
  const ABLY_KEY = '7QGBGw.Vz9tfw:4309G68-vx0dcWNUgJI2Vqi4qaAp-4Gpb2f2ULRMb4o';
  const ably   = new Ably.Realtime({ key: ABLY_KEY });
  const channel = ably.channels.get('livedoc');

  const connPill  = document.getElementById('conn-pill');
  const pillDot   = document.getElementById('pill-dot');
  const pillLabel = document.getElementById('pill-label');
  const msgInput  = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('send-btn');
  const appendBtn = document.getElementById('append-btn');
  const clearBtn  = document.getElementById('clear-btn');
  const preview   = document.getElementById('preview-text');

  let tvText = '';

  // ── CONNECTION STATE ──
  ably.connection.on('connected', () => {
    connPill.classList.add('on');
    pillDot.classList.add('on');
    pillLabel.textContent = '已连接';
    sendBtn.disabled = false;
  });
  ably.connection.on('disconnected', () => {
    connPill.classList.remove('on');
    pillDot.classList.remove('on');
    pillLabel.textContent = '已断开';
  });

  // ── RECEIVE UPDATES (preview what's on TV) ──
  channel.subscribe('update', msg => {
    tvText = msg.data || '';
    renderPreview(tvText);
  });
  channel.subscribe('clear', () => {
    tvText = '';
    renderPreview('');
  });

  function renderPreview(text) {
    preview.innerHTML = '';
    if (text) preview.appendChild(document.createTextNode(text));
    const cur = document.createElement('span');
    cur.className = 'preview-cursor';
    preview.appendChild(cur);
  }

  // ── SEND (replace) ──
  sendBtn.addEventListener('click', () => {
    const text = msgInput.value.trim();
    if (!text) return;
    channel.publish('update', text);
    tvText = text;
    renderPreview(tvText);
    msgInput.value = '';
    autoResize();
  });

  // ── APPEND ──
  appendBtn.addEventListener('click', () => {
    const text = msgInput.value;
    if (!text) return;
    const newText = tvText ? tvText + '\n' + text : text;
    channel.publish('update', newText);
    tvText = newText;
    renderPreview(tvText);
    msgInput.value = '';
    autoResize();
  });

  // ── CLEAR ──
  clearBtn.addEventListener('click', () => {
    channel.publish('clear', '');
    tvText = '';
    renderPreview('');
    msgInput.value = '';
    autoResize();
  });

  // ── SEND ON ENTER (shift+enter = newline) ──
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // ── AUTO-RESIZE TEXTAREA ──
  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  }
  msgInput.addEventListener('input', autoResize);
</script>
</body>
</html>
