<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPE HERE</title>
<script src="/pusher.min.js"></script>
<script src="/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #060606; overflow: hidden; font-family: 'IBM Plex Mono', monospace; }

  .stage {
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 20px;
    gap: 12px;
  }

  /* LEFT: VIDEO */
  .video-panel {
    position: relative; background: #0a0a0a; border: 1px solid #181818;
    overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .upload-zone { display: flex; flex-direction: column; align-items: center; gap: 14px; color: #222; transition: color 0.3s; user-select: none; }
  .video-panel:hover .upload-zone { color: #444; }
  .upload-cross { width: 48px; height: 48px; position: relative; }
  .upload-cross::before, .upload-cross::after { content: ''; position: absolute; background: currentColor; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .upload-cross::before { width: 1px; height: 100%; }
  .upload-cross::after { width: 100%; height: 1px; }
  .upload-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; }
  #video-el { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  #file-input { display: none; }
  .panel-tag { position: absolute; top: 12px; left: 12px; font-size: 8px; letter-spacing: 0.2em; color: #1e1e1e; text-transform: uppercase; z-index: 5; }

  /* RIGHT: LIVE COMMENTS */
  .doc-panel { background: #0a0a0a; border: 1px solid #181818; display: flex; flex-direction: column; overflow: hidden; }

  .term-bar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid #141414; background: #0d0d0d;
  }
  .term-dots { display: flex; gap: 6px; }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; background: #1e1e1e; }
  .term-title { font-size: 9px; letter-spacing: 0.18em; color: #2a2a2a; text-transform: uppercase; }
  .term-right { display: flex; align-items: center; gap: 12px; }
  .conn-badge { font-size: 8px; letter-spacing: 0.12em; color: #222; text-transform: uppercase; padding: 3px 8px; border: 1px solid #181818; }
  .conn-badge.connected { color: #3a3a3a; border-color: #252525; }
  .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .qr-box { width: 112px; height: 112px; background: #ececec; padding: 6px; display: flex; align-items: center; justify-content: center; }
  #qr-div { width: 100px; height: 100px; }
  #qr-div img { width: 100px !important; height: 100px !important; }
  .qr-label { font-size: 7px; letter-spacing: 0.14em; color: #222; text-transform: uppercase; }

  /* COMMENTS */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    scrollbar-width: thin; scrollbar-color: #1a1a1a transparent;
    display: flex; flex-direction: column; gap: 16px;
    position: relative;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: #1e1e1e; }

  /* CRT scanline overlay */
  .messages::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
    );
  }

  .msg-block { display: flex; flex-direction: column; gap: 4px; }

  /* Entry flash for all new comment blocks */
  @keyframes msg-arrive {
    0%   { opacity: 0; transform: translateX(-6px); }
    55%  { opacity: 1; transform: translateX(2px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  .msg-block.msg-new { animation: msg-arrive 0.28s cubic-bezier(.2,.8,.4,1) both; }

  /* Border flare on new comment */
  @keyframes border-flare-green {
    0%   { border-left-color: #1f7f4a; box-shadow: none; }
    25%  { border-left-color: #43d27c; box-shadow: -3px 0 10px #43d27c66; }
    100% { border-left-color: #1f7f4a; box-shadow: none; }
  }
  .msg-block.msg-new .msg-text {
    animation: border-flare-green 1s ease 0.05s both;
  }

  .msg-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 9px; letter-spacing: 0.1em;
  }
  .msg-meta .user { color: #404040; }
  .msg-meta .sep  { color: #1e1e1e; }
  .msg-meta .device { color: #2a2a2a; }
  .msg-meta .time { color: #222; }
  .msg-text {
    font-size: clamp(12px, 1.5vw, 19px);
    line-height: 1.6; word-break: break-word; white-space: pre-wrap;
    padding-left: 14px; border-left: 1px solid #1f7f4a;
    color: #43d27c;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  }
  .empty-prompt { font-size: 11px; color: #1e1e1e; letter-spacing: 0.1em; }
  .cursor-alone { display: inline-block; width: 8px; height: 16px; background: #1e1e1e; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px; }

  .term-footer {
    flex-shrink: 0; padding: 8px 16px; border-top: 1px solid #141414;
    display: flex; align-items: center; justify-content: space-between; background: #0d0d0d;
  }
  .footer-stat { font-size: 8px; letter-spacing: 0.14em; color: #1e1e1e; }
  .footer-stat span { color: #2e2e2e; }
  .footer-copy { font-size: 8px; letter-spacing: 0.14em; color: #202020; text-transform: uppercase; }
</style>
</head>
<body>
<div class="stage">
  <!-- LEFT: VIDEO -->
  <div class="video-panel" onclick="document.getElementById('file-input').click()">
    <span class="panel-tag">— video</span>
    <input type="file" id="file-input" accept="video/*">
    <div class="upload-zone" id="upload-zone">
      <div class="upload-cross"></div>
      <span class="upload-label">click to upload</span>
    </div>
    <video id="video-el" autoplay loop muted playsinline></video>
  </div>

  <!-- RIGHT: LIVE COMMENTS -->
  <div class="doc-panel">
    <div class="term-bar">
      <div class="term-dots">
        <div class="term-dot"></div>
        <div class="term-dot"></div>
        <div class="term-dot"></div>
      </div>
      <span class="term-title">type here — live comments</span>
      <div class="term-right">
        <span class="conn-badge" id="conn-badge">connecting...</span>
        <div class="qr-wrap">
          <div class="qr-box"><div id="qr-div"></div></div>
          <div class="qr-label">scan to comment</div>
        </div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <span class="empty-prompt">awaiting comments<span class="cursor-alone"></span></span>
      </div>
    </div>

    <div class="term-footer">
      <span class="footer-copy">mobile input: name / font / comment</span>
      <div>
        <span class="footer-stat">comments <span id="msg-count">0</span></span>
        <span class="footer-stat" style="margin-left: 14px;">devices <span id="device-count">0</span></span>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('video-el').src = URL.createObjectURL(file);
    document.getElementById('video-el').style.display = 'block';
    document.getElementById('upload-zone').style.display = 'none';
  });

  const mobileUrl = new URL('mobile.html', window.location.href).toString();

  new QRCode(document.getElementById('qr-div'), {
    text: mobileUrl,
    width: 100, height: 100,
    colorDark: '#0a0a0a', colorLight: '#ececec',
    correctLevel: QRCode.CorrectLevel.M
  });

  const pusher   = new Pusher('8e1cefae4252719fab23', { cluster: 'us2', forceTLS: true });
  const channel  = pusher.subscribe('livedoc');
  const connBadge  = document.getElementById('conn-badge');
  const messages   = document.getElementById('messages');
  const msgCount   = document.getElementById('msg-count');
  const deviceCount = document.getElementById('device-count');
  const emptyState = document.getElementById('empty-state');
  const renderedIds = new Set();

  pusher.connection.bind('connected', () => { connBadge.textContent = 'connected'; connBadge.classList.add('connected'); });
  pusher.connection.bind('disconnected', () => { connBadge.textContent = 'disconnected'; connBadge.classList.remove('connected'); });

  let allMessages = [];
  let timers = {};

  function saveSession() {
    try {
      localStorage.setItem('gr_comments', JSON.stringify(allMessages));
    } catch {}
  }

  const fontMap = {
    'mono':      "'IBM Plex Mono', monospace",
    'serif':     "'Times New Roman', Times, serif",
    'helvetica': "Helvetica, Arial, sans-serif",
    'courier':   "'Courier New', Courier, monospace",
    'georgia':   "Georgia, serif",
    'garamond':  "Garamond, 'Times New Roman', serif"
  };

  const fontSizeMap = {
    'sm': '14px',
    'md': '18px',
    'lg': '24px',
    'xl': '30px'
  };

  channel.bind('message', data => addComment(data));

  channel.bind('clear', () => {
    resetComments();
  });

  channel.bind('requestSync', () => {
    if (allMessages.length > 0) {
      fetch('/api/pusher', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event: 'syncAll', data: { messages: allMessages } })
      });
    }
  });

  channel.bind('syncAll', data => {
    if (!data.messages || allMessages.length > 0) return;
    hydrateComments(data.messages.filter(isCommentRecord));
  });

  function addComment(data, isSynced) {
    if (!isCommentRecord(data)) return;
    if (renderedIds.has(data.id)) return;

    if (!allMessages.some(message => message.id === data.id)) {
      allMessages.push(data);
    }

    if (!isSynced) saveSession();
    emptyState.style.display = 'none';

    const block = document.createElement('div');
    block.className = 'msg-block';
    if (!isSynced) {
      block.classList.add('msg-new');
      block.addEventListener('animationend', () => block.classList.remove('msg-new'), { once: true });
    }
    block.dataset.id = data.id;

    const elapsed = isSynced ? Math.floor((Date.now() - data.ts) / 1000) : 0;
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `<span class="user">${escHtml(data.user)}</span><span class="sep">/</span><span class="device">${escHtml(data.device)}</span><span class="sep">/</span><span class="time" data-ts="${data.ts}">${formatTime(elapsed)}</span>`;

    const textEl = document.createElement('div');
    textEl.className = 'msg-text';
    textEl.style.fontFamily = fontMap[data.font] || fontMap['mono'];
    textEl.style.fontSize = fontSizeMap[data.fontSize] || fontSizeMap['md'];
    textEl.textContent = data.text;

    block.appendChild(meta);
    block.appendChild(textEl);
    messages.appendChild(block);
    messages.scrollTop = messages.scrollHeight;
    renderedIds.add(data.id);

    timers[data.id] = setInterval(() => {
      const timeEl = block.querySelector('[data-ts]');
      if (timeEl) timeEl.textContent = formatTime(Math.floor((Date.now() - data.ts) / 1000));
    }, 10000);

    updateStats();
  }

  function formatTime(secs) {
    if (secs < 60) return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  }

  function updateStats() {
    msgCount.textContent = allMessages.length;
    deviceCount.textContent = String(new Set(allMessages.map(message => message.device)).size);
  }

  function resetComments() {
    allMessages = [];
    clearTimers();
    renderedIds.clear();
    localStorage.removeItem('gr_comments');
    localStorage.removeItem('gr_messages');
    messages.innerHTML = '';
    messages.appendChild(emptyState);
    emptyState.style.display = 'flex';
    updateStats();
  }

  function hydrateComments(comments) {
    resetComments();

    const nextComments = Array.isArray(comments)
      ? comments.filter(isCommentRecord).sort((left, right) => left.ts - right.ts)
      : [];

    nextComments.forEach(comment => addComment(comment, true));
    saveSession();
  }

  async function loadStoredComments() {
    try {
      const res = await fetch('/api/comments');
      if (!res.ok) throw new Error(`Request failed with ${res.status}`);
      const data = await res.json();
      if (Array.isArray(data.comments)) {
        hydrateComments(data.comments);
      }
    } catch {}
  }

  function clearTimers() {
    Object.values(timers).forEach(clearInterval);
    timers = {};
  }

  function isCommentRecord(record) {
    return Boolean(record && record.id && typeof record.text === 'string' && record.user && record.device && record.ts && !record.role);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  (function restoreSession() {
    try {
      const savedComments = JSON.parse(localStorage.getItem('gr_comments') || 'null');
      const fallbackComments = JSON.parse(localStorage.getItem('gr_messages') || '[]');
      const initialComments = Array.isArray(savedComments)
        ? savedComments
        : Array.isArray(fallbackComments)
          ? fallbackComments.filter(isCommentRecord)
          : [];

      if (!initialComments.length) {
        updateStats();
        return;
      }

      allMessages = initialComments;
      initialComments.forEach(m => addComment(m, true));
    } catch {}
  })();

  loadStoredComments();
</script>
</body>
</html>
