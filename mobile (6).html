<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参与互动</title>
<script src="/pusher.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; background: #080808; font-family: 'Space Mono', monospace; color: #e0e0e0; }
  .screen { width: 100%; min-height: 100dvh; display: flex; flex-direction: column; }
  .header { flex-shrink: 0; padding: 28px 24px 20px; border-bottom: 1px solid #161616; display: flex; align-items: center; justify-content: space-between; }
  .title-block { display: flex; flex-direction: column; gap: 5px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.08em; color: #e8e8e8; line-height: 1; }
  .subtitle { font-size: 8px; letter-spacing: 0.22em; color: #333; text-transform: uppercase; }
  .conn-pill { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid #1c1c1c; }
  .pill-dot { width: 5px; height: 5px; background: #333; border-radius: 50%; transition: background 0.3s; }
  .pill-dot.on { background: #aaa; animation: throb 2s ease-in-out infinite; }
  @keyframes throb { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
  .pill-label { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #333; transition: color 0.3s; }
  .conn-pill.on .pill-label { color: #666; }
  .preview { flex: 1; min-height: 120px; overflow-y: auto; padding: 24px; scrollbar-width: none; }
  .preview::-webkit-scrollbar { display: none; }
  .preview-label { font-size: 8px; letter-spacing: 0.2em; color: #222; text-transform: uppercase; margin-bottom: 14px; }
  #preview-text { font-size: 18px; line-height: 1.7; color: #585858; word-break: break-word; white-space: pre-wrap; min-height: 40px; }
  .preview-cursor { display: inline-block; width: 10px; height: 18px; background: #2a2a2a; vertical-align: text-bottom; animation: blink 1s step-end infinite; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .input-area { flex-shrink: 0; background: #0e0e0e; border-top: 1px solid #161616; padding: 16px 20px env(safe-area-inset-bottom, 24px); display: flex; flex-direction: column; gap: 12px; position: sticky; bottom: 0; }
  .char-bar { display: flex; align-items: center; justify-content: space-between; }
  .char-hint { font-size: 8px; letter-spacing: 0.15em; color: #222; text-transform: uppercase; }
  .clear-btn { background: transparent; border: 1px solid #1c1c1c; color: #2a2a2a; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; padding: 5px 12px; cursor: pointer; }
  .clear-btn:active { color: #666; border-color: #333; }
  #msg-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #1e1e1e; color: #e0e0e0; font-family: 'Space Mono', monospace; font-size: 16px; line-height: 1.6; padding: 10px 0; outline: none; resize: none; min-height: 56px; max-height: 160px; caret-color: #888; }
  #msg-input::placeholder { color: #1e1e1e; }
  #msg-input:focus { border-color: #333; }
  .send-row { display: flex; gap: 10px; align-items: center; }
  .send-btn { flex: 1; background: #e8e8e8; border: none; color: #080808; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 14px 0; cursor: pointer; }
  .send-btn:active { background: #bbb; }
  .send-btn:disabled { background: #1a1a1a; color: #333; cursor: default; }
  .append-btn { background: transparent; border: 1px solid #1c1c1c; color: #2e2e2e; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; padding: 14px 16px; cursor: pointer; white-space: nowrap; }
  .append-btn:active { color: #666; border-color: #333; }
</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="title-block">
      <div class="title">LIVE DOC</div>
      <div class="subtitle">扫码互动终端</div>
    </div>
    <div class="conn-pill" id="conn-pill">
      <div class="pill-dot" id="pill-dot"></div>
      <span class="pill-label" id="pill-label">连接中</span>
    </div>
  </div>
  <div class="preview">
    <div class="preview-label">— 电视上显示的内容</div>
    <div id="preview-text"><span class="preview-cursor"></span></div>
  </div>
  <div class="input-area">
    <div class="char-bar">
      <span class="char-hint">输入内容 · 实时同步到大屏</span>
      <button class="clear-btn" id="clear-btn">清空</button>
    </div>
    <textarea id="msg-input" placeholder="在这里打字…" rows="2"></textarea>
    <div class="send-row">
      <button class="send-btn" id="send-btn" disabled>新行发送</button>
      <button class="append-btn" id="append-btn">接续</button>
    </div>
  </div>
</div>
<script>
  const pusher  = new Pusher('8e1cefae4252719fab23', { cluster: 'us2', forceTLS: true });
  const channel = pusher.subscribe('livedoc');

  const connPill  = document.getElementById('conn-pill');
  const pillDot   = document.getElementById('pill-dot');
  const pillLabel = document.getElementById('pill-label');
  const msgInput  = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('send-btn');
  const appendBtn = document.getElementById('append-btn');
  const clearBtn  = document.getElementById('clear-btn');
  const preview   = document.getElementById('preview-text');

  let tvText = '';

  pusher.connection.bind('connected', () => {
    connPill.classList.add('on'); pillDot.classList.add('on');
    pillLabel.textContent = '已连接'; sendBtn.disabled = false;
    // 新设备连上后请求当前状态
    publish('requestSync', {});
  });
  pusher.connection.bind('disconnected', () => {
    connPill.classList.remove('on'); pillDot.classList.remove('on');
    pillLabel.textContent = '已断开'; sendBtn.disabled = true;
  });

  channel.bind('update', data => { tvText = data.text || ''; renderPreview(tvText); });
  channel.bind('clear',  ()   => { tvText = ''; renderPreview(''); });
  // 收到同步请求时，把自己的内容广播出去
  channel.bind('requestSync', () => {
    if (tvText) publish('update', { text: tvText });
  });

  function renderPreview(text) {
    preview.innerHTML = '';
    if (text) preview.appendChild(document.createTextNode(text));
    const cur = document.createElement('span');
    cur.className = 'preview-cursor';
    preview.appendChild(cur);
  }

  async function publish(event, data) {
    await fetch('/api/pusher', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event, data })
    });
  }

  sendBtn.addEventListener('click', async () => {
    const text = msgInput.value.trim();
    if (!text) return;
    tvText = tvText ? tvText + '\n' + text : text;
    renderPreview(tvText);
    msgInput.value = ''; autoResize();
    await publish('update', { text: tvText });
  });

  appendBtn.addEventListener('click', async () => {
    const text = msgInput.value.trim();
    if (!text) return;
    tvText = tvText ? tvText + ' ' + text : text;
    renderPreview(tvText);
    msgInput.value = ''; autoResize();
    await publish('update', { text: tvText });
  });

  clearBtn.addEventListener('click', async () => {
    tvText = ''; renderPreview('');
    msgInput.value = ''; autoResize();
    await publish('clear', {});
  });

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });

  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  }
  msgInput.addEventListener('input', autoResize);
</script>
</body>
</html>
